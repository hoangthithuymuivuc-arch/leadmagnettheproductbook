  <text x="600" y="165" text-anchor="middle" fill="#f8fafc" font-family="system-ui, Segoe UI, sans-serif" font-size="52" font-weight="700">Product Academy</text>
  <text x="600" y="220" text-anchor="middle" fill="#94a3b8" font-family="system-ui, Segoe UI, sans-serif" font-size="22" font-weight="500">Cộng đồng người làm sản phẩm</text>
  <rect x="440" y="250" width="320" height="5" rx="3" fill="url(#accent)" opacity="0.95"/>

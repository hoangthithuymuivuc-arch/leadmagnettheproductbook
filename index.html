<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Product Book | Reader</title>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Playfair Display", "serif"]
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    .chapter-content {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 320ms ease, transform 320ms ease;
    }
    .chapter-content.show {
      opacity: 1;
      transform: translateY(0);
    }
    .sidebar-item.active {
      color: #f8fafc;
      background: #1e293b;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 antialiased">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-10">
    <header class="mb-8">
      <p class="text-xs uppercase tracking-[0.22em] text-slate-500 font-semibold">Lead Magnet Reader</p>
      <h1 class="font-display text-4xl md:text-5xl font-bold tracking-tight text-slate-900 mt-2">The Product Book</h1>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-[280px_minmax(0,1fr)] gap-6 lg:gap-8">
      <aside class="lg:sticky lg:top-8 self-start">
        <h2 class="text-sm uppercase tracking-wider text-slate-500 font-semibold mb-3">Mục lục</h2>
        <ul id="tocList" class="space-y-1"></ul>
      </aside>

      <section class="rounded-3xl shadow-2xl shadow-slate-900/20 overflow-hidden bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950">
        <div class="px-5 md:px-8 py-4 md:py-5 border-b border-white/10 flex items-center justify-between gap-3">
          <button id="prevBtn" class="px-4 py-2 rounded-lg bg-white/10 text-white hover:bg-white/20 disabled:opacity-40 disabled:cursor-not-allowed">
            Trước
          </button>
          <h3 id="currentChapterTitle" class="text-sm md:text-base font-semibold text-slate-100 text-center">
            Đang tải...
          </h3>
          <button id="nextBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed">
            Sau
          </button>
        </div>

        <div class="px-5 md:px-8 pt-4">
          <div class="h-2 w-full bg-white/10 rounded-full overflow-hidden">
            <div id="progressBar" class="h-2 bg-blue-400 rounded-full transition-all duration-300" style="width:0%"></div>
          </div>
          <p id="progressText" class="text-xs text-slate-300 mt-2">0%</p>
        </div>

        <article id="chapterContent" class="chapter-content prose prose-invert prose-slate max-w-none px-5 md:px-8 py-6 md:py-8 min-h-[70vh]">
          <p class="text-slate-300">Đang tải nội dung chương...</p>
        </article>
      </section>
    </main>
  </div>

  <script>
    const chapters = [
      { title: "Chương 1: What Is Product Management?", file: "Chapter_01_The_Product_Book.html" },
      { title: "Chương 2: Understanding Your Company's Vision", file: "Chapter_02_The_Product_Book.html" },
      { title: "Chương 3: Understanding the Market", file: "Chapter_03_The_Product_Book.html" },
      { title: "Chương 4: Product Discovery", file: "Chapter_04_The_Product_Book.html" },
      { title: "Chương 5: Product Delivery", file: "Chapter_05_The_Product_Book.html" },
      { title: "Chương 6: Product Tracking and Growth", file: "Chapter_06_The_Product_Book.html" },
      { title: "Chương 7: Working with Teams", file: "Chapter_07_The_Product_Book.html" },
      { title: "Chương 8: Working with Stakeholders", file: "Chapter_08_The_Product_Book.html" },
      { title: "Chương 9: Finishing the Cycle", file: "Chapter_09_The_Product_Book.html" }
    ];

    const chapterContent = document.getElementById("chapterContent");
    const currentChapterTitle = document.getElementById("currentChapterTitle");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const tocList = document.getElementById("tocList");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const cache = new Map();
    let currentIndex = 0;

    function renderToc() {
      tocList.innerHTML = "";
      chapters.forEach((chapter, index) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.className = "sidebar-item w-full text-left rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-200 transition";
        btn.textContent = chapter.title;
        if (index === currentIndex) btn.classList.add("active");
        btn.addEventListener("click", () => loadChapter(index));
        li.appendChild(btn);
        tocList.appendChild(li);
      });
    }

    function updateProgress() {
      const value = Math.round(((currentIndex + 1) / chapters.length) * 100);
      progressBar.style.width = value + "%";
      progressText.textContent = value + "% - " + (currentIndex + 1) + "/" + chapters.length;
    }

    function updateHeader() {
      currentChapterTitle.textContent = chapters[currentIndex].title;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === chapters.length - 1;
    }

    function extractChapterBody(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");
      const body = doc.querySelector("body");
      return body ? body.innerHTML : htmlText;
    }

    async function getChapterHtml(chapterFile) {
      if (cache.has(chapterFile)) return cache.get(chapterFile);
      const response = await fetch(chapterFile);
      if (!response.ok) {
        throw new Error("Không tải được chương: " + chapterFile);
      }
      const text = await response.text();
      const html = extractChapterBody(text);
      cache.set(chapterFile, html);
      return html;
    }

    async function loadChapter(index) {
      if (index < 0 || index >= chapters.length) return;
      currentIndex = index;
      updateHeader();
      updateProgress();
      renderToc();

      chapterContent.classList.remove("show");
      chapterContent.innerHTML = "<p class='text-slate-300'>Đang tải nội dung chương...</p>";

      try {
        const html = await getChapterHtml(chapters[index].file);
        chapterContent.innerHTML = html;
      } catch (error) {
        chapterContent.innerHTML = "<p class='text-red-300'>Lỗi tải nội dung. Hãy kiểm tra đường dẫn file chương.</p>";
      }

      requestAnimationFrame(() => {
        chapterContent.classList.add("show");
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    prevBtn.addEventListener("click", () => loadChapter(currentIndex - 1));
    nextBtn.addEventListener("click", () => loadChapter(currentIndex + 1));
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") loadChapter(currentIndex - 1);
      if (event.key === "ArrowRight") loadChapter(currentIndex + 1);
    });

    loadChapter(0);
  </script>
</body>
</html>
